# Default SDK for every Robolectric (JVM) test (issue #373). compileSdk/targetSdk are 37, a
# preview level Robolectric 4.16.x does not ship a sandbox for; 36 (Baklava) is its newest
# supported level and needs JDK 21 (the project's Gradle JDK). Individual tests may still override
# with @Config(sdk = [..]). Only affects tests run with RobolectricTestRunner; plain JUnit unit
# tests are unaffected.
sdk=36
